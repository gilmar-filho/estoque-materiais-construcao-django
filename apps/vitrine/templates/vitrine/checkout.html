{% extends 'base.html' %} {% block content %}

<div
  class="min-h-screen bg-gradient-to-br from-stone-900 via-neutral-950 to-zinc-900 flex items-center justify-center px-4"
>
  <div
    class="w-full max-w-lg bg-gradient-to-br from-stone-800 to-zinc-900 rounded-3xl shadow-2xl border border-orange-500/20 p-10 text-center"
  >
    <div
      class="w-20 h-20 bg-green-500/20 border border-green-400/30 rounded-full flex items-center justify-center mx-auto mb-6"
    >
      <svg
        class="w-10 h-10 text-green-400"
        fill="none"
        stroke="currentColor"
        viewBox="0 0 24 24"
      >
        <path
          stroke-linecap="round"
          stroke-linejoin="round"
          stroke-width="2"
          d="M5 13l4 4L19 7"
        />
      </svg>
    </div>

    <h1 class="text-3xl font-extrabold text-white mb-3">
      Reserva confirmada!
    </h1>

    <p class="text-gray-300 mb-8">
      Seu pedido foi registrado com sucesso.
    </p>

    <div
      class="bg-amber-500/10 border border-amber-400/30 rounded-2xl px-6 py-4 mb-8"
    >
      <p class="text-amber-200 text-sm font-medium">
        Retire seus materiais em até <span class="font-bold text-amber-400">7 dias corridos</span>.
        Após esse prazo a reserva poderá ser cancelada.
      </p>
    </div>

    <a
      href="{% url 'catalogo' %}"
      class="inline-block bg-gradient-to-r from-amber-500 to-orange-600 text-white px-8 py-3 rounded-2xl font-bold hover:from-amber-400 hover:to-orange-500 hover:shadow-lg hover:shadow-orange-500/30 transition duration-300"
    >
      Voltar ao Catálogo
    </a>
  </div>
</div>

{% endblock %}
