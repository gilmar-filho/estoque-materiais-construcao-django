{% extends 'base.html' %} {% block content %}

<div
  class="min-h-screen flex items-center justify-center bg-gradient-to-br from-stone-900 via-neutral-950 to-zinc-900 px-4"
>
  <div
    class="w-full max-w-md bg-gradient-to-br from-stone-800 to-zinc-900 rounded-3xl shadow-2xl border border-orange-500/20 p-8"
  >
    <div class="text-center mb-8">
      <h1 class="text-4xl font-extrabold text-white mb-3">Login</h1>

      <p class="text-orange-200">Acesse sua conta para reservar materiais</p>
    </div>

    <form method="POST" class="space-y-6">
      {% csrf_token %}

      <div>
        <label class="block mb-2 text-sm font-semibold text-orange-200">
          Username
        </label>

        <input
          type="text"
          name="username"
          class="w-full bg-zinc-900/70 text-white border border-stone-600 rounded-xl px-4 py-3 focus:outline-none focus:ring-2 focus:ring-orange-500"
          placeholder="Digite seu username"
        />
      </div>

      <div>
        <label class="block mb-2 text-sm font-semibold text-orange-200">
          Senha
        </label>

        <input
          type="password"
          name="password"
          class="w-full bg-zinc-900/70 text-white border border-stone-600 rounded-xl px-4 py-3 focus:outline-none focus:ring-2 focus:ring-orange-500"
          placeholder="Digite sua senha"
        />
      </div>

      <button
        type="submit"
        class="w-full bg-gradient-to-r from-amber-500 to-orange-600 text-white py-3 rounded-xl font-bold hover:from-amber-400 hover:to-orange-500 hover:shadow-lg hover:shadow-orange-500/30 transition duration-300"
      >
        Entrar
      </button>
    </form>

    <p class="text-center text-sm text-gray-300 mt-8">
      Não possui conta?

      <a
        href="{% url 'cadastro' %}"
        class="text-amber-400 hover:text-amber-300 font-semibold transition duration-200"
      >
        Criar conta
      </a>
    </p>
  </div>
</div>

{% endblock %}
