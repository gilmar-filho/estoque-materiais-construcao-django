{% extends 'base.html' %} {% block content %}

<div
  class="min-h-screen flex items-center justify-center bg-gradient-to-br from-stone-900 via-neutral-950 to-zinc-900 px-4 py-10"
>
  <div
    class="w-full max-w-md bg-gradient-to-br from-stone-800 to-zinc-900 rounded-3xl shadow-2xl border border-orange-500/20 p-8"
  >
    <div class="text-center mb-8">
      <h1 class="text-4xl font-extrabold text-white mb-3">Criar Conta</h1>

      <p class="text-orange-200">Cadastre-se para reservar materiais</p>
    </div>

    <form method="POST" class="space-y-5">
      {% csrf_token %} {% for field in form %}

      <div>
        <label class="block text-sm font-semibold text-orange-200 mb-2">
          {{ field.label }}
        </label>

        {{ field }} {% if field.errors %}

        <p class="text-red-400 text-sm mt-2">{{ field.errors|striptags }}</p>

        {% endif %}
      </div>

      {% endfor %}

      <button
        type="submit"
        class="w-full bg-gradient-to-r from-amber-500 to-orange-600 text-white py-3 rounded-xl font-bold hover:from-amber-400 hover:to-orange-500 hover:shadow-lg hover:shadow-orange-500/30 transition duration-300"
      >
        Cadastrar
      </button>
    </form>

    <p class="text-center text-sm text-gray-300 mt-8">
      Já possui conta?

      <a
        href="{% url 'login' %}"
        class="text-amber-400 hover:text-amber-300 font-semibold transition duration-200"
      >
        Fazer login
      </a>
    </p>
  </div>
</div>

{% endblock %}
